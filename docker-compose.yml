services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://shamal:shamal@postgres:5432/shamal_middleware
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shamal
      POSTGRES_PASSWORD: shamal
      POSTGRES_DB: shamal_middleware
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shamal -d shamal_middleware"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
